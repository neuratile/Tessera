services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: testing-ide-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-testing_ide}
      POSTGRES_USER: ${POSTGRES_USER:-testing_ide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testing_ide_dev_password}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-testing_ide} -d ${POSTGRES_DB:-testing_ide}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: testing-ide-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10

  tessera-server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: tessera-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-testing_ide}:${POSTGRES_PASSWORD:-testing_ide_dev_password}@postgres:5432/${POSTGRES_DB:-testing_ide}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-minimum-32-bytes-long!!}
      SERVER_PORT: 3001
      CORS_ORIGINS: http://localhost:1420
    ports:
      - "127.0.0.1:${SERVER_PORT:-3001}:3001"

volumes:
  postgres-data:
  ollama-data:

