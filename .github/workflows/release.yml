name: Release

# Phase 7 — release-bundle workflow.
#
# Triggered by `git push --tags` for tags matching `v*`. Builds the Tauri
# desktop app on Windows, macOS (universal), and Ubuntu, then publishes a
# draft GitHub Release with the platform installers attached. Maintainer
# edits the release notes and clicks "Publish" once the bundles look good.
#
# To cut a release:
#   1. Bump versions in `apps/desktop/package.json` and
#      `apps/desktop/src-tauri/Cargo.toml` + `tauri.conf.json`.
#   2. Commit + tag: `git tag v0.1.0 && git push origin v0.1.0`
#   3. Watch this workflow; review the draft release; publish.

on:
  push:
    tags:
      - 'v*'
  # Manual dispatch re-runs a failed platform bundle without re-tagging.
  # Run it from the tag ref in the dispatch UI so tauri-action resolves
  # the matching release.
  workflow_dispatch:

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  bundle:
    name: bundle (${{ matrix.platform.label }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { label: linux,   runner: ubuntu-latest,  args: '' }
          - { label: macos,   runner: macos-latest,   args: '--target universal-apple-darwin' }
          - { label: windows, runner: windows-latest, args: '' }
    runs-on: ${{ matrix.platform.runner }}
    # Full Tauri bundles (Rust release build + installers) run 20-40 min
    # per platform; 90 keeps a wedged runner from burning the 6 h default.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux WebKit deps
        if: matrix.platform.runner == 'ubuntu-latest'
        uses: ./.github/actions/linux-tauri-deps

      - name: Install Rust (stable + universal target on macOS)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.runner == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build + bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Tessera ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.platform.args }}
