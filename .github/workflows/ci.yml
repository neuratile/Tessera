name: CI

# Phase 7 — gating CI for the Rust backend + pnpm frontend.
#
# Per `rules.md` §4.2 + §7: every push and PR runs fmt, clippy, lib tests,
# release build, and the workspace-level pnpm lint / typecheck. Live-Ollama
# integration tests under `apps/desktop/src-tauri/tests/` are opt-in via
# `OLLAMA_INTEGRATION=1` and not exercised here — see `integration_ollama.rs`
# for run instructions.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux WebKit deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install Rust toolchain (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --lib -- -D warnings

      - name: cargo test --lib
        run: cargo test --lib --no-fail-fast

      - name: cargo build --release --lib
        run: cargo build --release --lib

  frontend:
    name: frontend (pnpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0
          run_install: false

      - name: Get pnpm store dir
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm -w lint

      - name: pnpm typecheck
        run: pnpm -w typecheck
