name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  # Manual re-runs without an empty commit — handy when a job failed on
  # runner flake (registry 429s, apt mirrors) rather than code.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  conflict-marker-check:
    name: conflict-marker-check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Scan for unresolved Git conflict markers
        # Hard-fail when `<<<<<<<`, `=======`, or `>>>>>>>` lines slip into
        # tracked source. Master has been broken three times by merge
        # commits that committed these markers as file content; this gate
        # catches it before the rest of CI even spins up.
        run: |
          set -euo pipefail
          if git grep -nE '^(<{7}|>{7}|={7})( |$)' -- \
              ':(exclude)pnpm-lock.yaml' \
              ':(exclude)*package-lock.json' \
              ':(exclude).github/workflows/ci.yml'; then
            echo ""
            echo "::error::Unresolved Git conflict markers found above. Resolve them locally with 'git status' before pushing."
            exit 1
          fi

  lint-and-test:
    name: lint-and-test
    # Merged job (was `lint` + `unit-test`): eslint + clippy static gates,
    # then the unit suite (`pnpm test` = Vitest + `cargo test --lib`). Both
    # halves need the same setup — node + pnpm + Rust + Tauri system libs —
    # so one job shares a single rust-cache restore and pnpm install instead
    # of paying that setup twice across two parallel jobs. Ubuntu-only by
    # design; release.yml covers the cross-OS bundle on tag pushes.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Tauri deps
        uses: ./.github/actions/linux-tauri-deps

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # Static gates first so a style/lint break fails fast before the
      # slower test compile + run.
      - name: Run workspace lint
        run: pnpm lint

      - name: Run cargo clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --all-targets --lib -- -D warnings

      # `if: always()` so a clippy failure above still runs the tests and
      # surfaces their pass/fail — the merge into one job must not hide the
      # unit-test signal behind a style break. clippy remains a hard gate:
      # the job conclusion is still failure when clippy fails.
      - name: Run unit tests
        if: always()
        run: pnpm test

  frontend-checks:
    name: frontend-checks
    # Merged node-only job (was `typecheck` + `build-check`): TypeScript
    # typecheck then the production Vite build. Neither needs Rust or the
    # Tauri system libs, so they share one checkout + pnpm install instead
    # of two. typecheck runs first; if it fails the build step is skipped
    # (a type error almost always breaks the bundle too). Ubuntu-only — tsc
    # and Rollup output are platform-independent.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Build production renderer bundle
        run: pnpm --filter @testing-ide/desktop run vite:build

  server-check:
    name: server-check
    # The boards server (apps/server) is a standalone Rust crate outside the
    # desktop Tauri crate, so the desktop lint/test jobs never compile it.
    # It uses runtime sqlx queries only (no `query!` macros), so clippy and
    # the unit tests need no database or DATABASE_URL to build.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/server

      - name: Run cargo clippy (server)
        run: cargo clippy --manifest-path apps/server/Cargo.toml --locked --all-targets -- -D warnings

      - name: Run cargo test (server)
        run: cargo test --manifest-path apps/server/Cargo.toml --locked

  e2e-test:
    name: e2e-test
    # Playwright E2E against the Vite dev server with a mocked Tauri IPC
    # layer (e2e-tauri-mocks.ts) — no Rust/Tauri build and no Docker. The
    # config starts its own Vite webServer on :4173. Covers renderer flows
    # including the sandbox Run/Stop + results panel from the test-runner
    # feature. Ubuntu-only: the DOM + mocks are platform-independent.
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + OS deps
        # PLAYWRIGHT_BROWSERS_PATH=0 stores browsers in node_modules
        # (.local-browsers), matching run-playwright-e2e.mjs at test time.
        # Without it the binaries land in the global ~/.cache and the suite
        # fails with "Executable doesn't exist at .../.local-browsers/...".
        run: pnpm --filter @testing-ide/desktop exec playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: '0'

      - name: Run Playwright E2E suite
        run: pnpm --filter @testing-ide/desktop run test:e2e

  sandbox-runner-test:
    name: sandbox-runner-test
    # End-to-end gate for the opt-in Docker sandbox (plan §7, ADR-0004):
    # builds the local-first `tessera-runner-js` image from its Dockerfile
    # and runs the Docker-gated `#[ignore]`d test that executes a real
    # vitest suite inside the hardened container (`--network none`,
    # `--cap-drop ALL`, read-only rootfs). Deterministic — no LLM, no
    # external service — so unlike integration-test this is a blocking
    # gate. Catches image regressions (e.g. the NODE_PATH/ESM resolution
    # break fixed in #55) that unit tests structurally cannot see.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Optional: when set as repo secrets, the build step authenticates to
      # Docker Hub instead of pulling anonymously. Anonymous pulls share a
      # rate-limit quota across all GitHub-hosted runner IPs, and a 429 on
      # this blocking gate would stall PRs for reasons unrelated to the code.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Tauri deps
        uses: ./.github/actions/linux-tauri-deps

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Restore cached runner image
        # The base image is digest-pinned, so the Dockerfile hash fully
        # determines the build output. A cache hit skips Docker Hub entirely
        # — the registry is only touched when the Dockerfile changes or the
        # cache was evicted, which keeps the blocking gate clear of
        # anonymous pull rate limits on routine runs.
        id: runner-image-cache
        uses: actions/cache@v4
        with:
          path: /tmp/tessera-runner-js.tar
          key: tessera-runner-js-${{ hashFiles('apps/desktop/src-tauri/docker/Dockerfile.runner-js') }}

      - name: Load cached runner image
        if: steps.runner-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/tessera-runner-js.tar

      - name: Log in to Docker Hub
        # Only on a cache miss, and only when the optional secrets exist —
        # forks and secretless runs still work, just anonymously.
        if: steps.runner-image-cache.outputs.cache-hit != 'true' && env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build sandbox runner image
        if: steps.runner-image-cache.outputs.cache-hit != 'true'
        # Retry with backoff so a transient registry failure (429 from the
        # shared anonymous quota, network blip) does not hard-fail the gate.
        run: |
          for attempt in 1 2 3; do
            if docker build -t tessera-runner-js \
                -f apps/desktop/src-tauri/docker/Dockerfile.runner-js \
                apps/desktop/src-tauri/docker; then
              docker save tessera-runner-js -o /tmp/tessera-runner-js.tar
              exit 0
            fi
            echo "::warning::docker build failed (attempt ${attempt}/3); retrying in $((attempt * 30))s"
            sleep $((attempt * 30))
          done
          echo "::error::docker build failed after 3 attempts"
          exit 1

      - name: Run Docker-gated sandbox runner test
        run: |
          cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --lib \
            -- --ignored docker_runner_executes

  coverage:
    name: coverage
    # Informational coverage report — LCOV for the frontend (vitest v8)
    # and the desktop Rust crate (cargo-llvm-cov). Non-blocking by design
    # (`continue-on-error`) so a coverage-tooling hiccup never red-bars a
    # PR; it exists to give contributors visibility into the rulebook's
    # 80% services/utilities target (rules.md §6), not to gate merges.
    # Both LCOV reports are uploaded as artifacts for external tooling.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Tauri deps
        uses: ./.github/actions/linux-tauri-deps

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend coverage (LCOV)
        run: pnpm --filter @testing-ide/desktop run test:coverage

      - name: Backend coverage (LCOV)
        run: |
          cargo llvm-cov --manifest-path apps/desktop/src-tauri/Cargo.toml \
            --locked --lib --lcov --output-path apps/desktop/src-tauri/lcov.info

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            apps/desktop/coverage/lcov.info
            apps/desktop/src-tauri/lcov.info
          if-no-files-found: warn

  integration-test:
    name: integration-test (ubuntu)
    runs-on: ubuntu-latest
    # Smoke test against a live Ollama instance. Generation quality and
    # stream reliability depend on CI runner resources (2 vCPU, 7 GB
    # RAM) which are insufficient for deterministic 1.5B-model output.
    # Failures here do not indicate code regressions — the unit suite,
    # typecheck, and lint (all in lint-and-test / frontend-checks) are the
    # correctness gates.
    continue-on-error: true
    # Gate the expensive Ollama job behind the cheap correctness checks so a
    # lint/type/test failure fails fast without spinning up the model. Depending
    # on `frontend-checks` (not just typecheck) now also waits on the Vite build
    # — an intentional, benign consequence of merging typecheck + build-check:
    # there is no point pulling a 1.5B model if the renderer doesn't even build.
    needs:
      - lint-and-test
      - frontend-checks
    # Worst case: golden test-cases probe retries 3× at 15 min per
    # attempt (~45 min) plus model pulls, warm-up, and the Rust suite.
    timeout-minutes: 90
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
        env:
          # Keep both the chat + embedding models hot for the full
          # integration suite. Default is 1 loaded model + 5m keep-alive,
          # which causes cold reloads between tests on the free GitHub
          # runner and pushes the chat call past the HTTP timeout.
          OLLAMA_MAX_LOADED_MODELS: "2"
          OLLAMA_KEEP_ALIVE: "30m"
          OLLAMA_NUM_PARALLEL: "1"
          # Ollama defaults to a 4096-token context. The v2 test-cases
          # prompt plus the 6k response reserve overflows that, forcing
          # a server-side context shift that discards the prompt — the
          # model then rambles to max_tokens and trips the 600s client
          # timeout (StreamInterrupted). 16k fits prompt + response with
          # headroom; KV cache for a 1.5B model at 16k is well within the
          # 7 GB runner.
          OLLAMA_CONTEXT_LENGTH: "16384"
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux Tauri deps
        uses: ./.github/actions/linux-tauri-deps

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Ollama API
        run: |
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:11434/api/version >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker ps
          exit 1

      - name: Resolve Ollama service container
        run: |
          OLLAMA_CONTAINER_ID="$(docker ps --filter 'ancestor=ollama/ollama' --filter 'publish=11434' --format '{{.ID}}' | head -n 1)"
          if [ -z "$OLLAMA_CONTAINER_ID" ]; then
            docker ps
            exit 1
          fi
          echo "OLLAMA_CONTAINER_ID=$OLLAMA_CONTAINER_ID" >> "$GITHUB_ENV"

      - name: Pull Ollama integration models
        run: |
          docker exec "$OLLAMA_CONTAINER_ID" ollama pull qwen2.5-coder:1.5b
          docker exec "$OLLAMA_CONTAINER_ID" ollama pull nomic-embed-text

      - name: Warm up Ollama models
        # First chat / embedding request after `ollama pull` triggers a
        # cold load that can take 60s+ on the free runner — and with
        # OLLAMA_CONTEXT_LENGTH=16384 the load also pre-allocates the
        # full 16k KV cache. Warming up here means the Vitest suite hits
        # an already-loaded model and does not race the 600s HTTP
        # timeout in the Rust client.
        run: |
          curl --fail --silent --max-time 300 http://127.0.0.1:11434/api/generate \
            -d '{"model":"qwen2.5-coder:1.5b","prompt":"hi","stream":false,"keep_alive":"30m"}' >/dev/null
          curl --fail --silent --max-time 120 http://127.0.0.1:11434/api/embeddings \
            -d '{"model":"nomic-embed-text","prompt":"hi","keep_alive":"30m"}' >/dev/null

      - name: Run desktop Vitest integration suite
        env:
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          OLLAMA_TEST_CHAT_MODEL: qwen2.5-coder:1.5b
          OLLAMA_TEST_EMBED_MODEL: nomic-embed-text
        run: pnpm --filter @testing-ide/desktop run test:integration

      - name: Run Rust Ollama integration suite
        env:
          OLLAMA_INTEGRATION: "1"
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          OLLAMA_TEST_CHAT_MODEL: qwen2.5-coder:1.5b
          OLLAMA_TEST_EMBED_MODEL: nomic-embed-text
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test integration_ollama -- --nocapture

      - name: Print Ollama logs on failure
        if: failure()
        run: |
          if [ -n "${OLLAMA_CONTAINER_ID:-}" ]; then
            docker logs "$OLLAMA_CONTAINER_ID"
          fi
