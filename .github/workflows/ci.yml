name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.9.0"

jobs:
  lint:
    name: lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace lint
        run: pnpm lint

      - name: Run cargo clippy
        run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --all-targets --lib -- -D warnings

  typecheck:
    name: typecheck (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript typecheck
        run: pnpm typecheck

  unit-test:
    name: unit-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  integration-test:
    name: integration-test (ubuntu)
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - unit-test
    timeout-minutes: 60
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Ollama API
        run: |
          for _ in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:11434/api/version >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker ps
          exit 1

      - name: Resolve Ollama service container
        run: |
          OLLAMA_CONTAINER_ID="$(docker ps --filter 'ancestor=ollama/ollama' --filter 'publish=11434' --format '{{.ID}}' | head -n 1)"
          if [ -z "$OLLAMA_CONTAINER_ID" ]; then
            docker ps
            exit 1
          fi
          echo "OLLAMA_CONTAINER_ID=$OLLAMA_CONTAINER_ID" >> "$GITHUB_ENV"

      - name: Pull Ollama integration models
        run: |
          docker exec "$OLLAMA_CONTAINER_ID" ollama pull qwen2.5-coder:1.5b
          docker exec "$OLLAMA_CONTAINER_ID" ollama pull nomic-embed-text

      - name: Run desktop Vitest integration suite
        env:
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          OLLAMA_TEST_CHAT_MODEL: qwen2.5-coder:1.5b
          OLLAMA_TEST_EMBED_MODEL: nomic-embed-text
        run: pnpm --filter @testing-ide/desktop run test:integration

      - name: Run Rust Ollama integration suite
        env:
          OLLAMA_INTEGRATION: "1"
          OLLAMA_BASE_URL: http://127.0.0.1:11434
          OLLAMA_TEST_CHAT_MODEL: qwen2.5-coder:1.5b
          OLLAMA_TEST_EMBED_MODEL: nomic-embed-text
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --test integration_ollama -- --nocapture

      - name: Print Ollama logs on failure
        if: failure()
        run: |
          if [ -n "${OLLAMA_CONTAINER_ID:-}" ]; then
            docker logs "$OLLAMA_CONTAINER_ID"
          fi
